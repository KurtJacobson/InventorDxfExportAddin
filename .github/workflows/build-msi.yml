name: Build MSI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup .NET (for WiX CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX toolset
        run: dotnet tool install --global wix --version 4.0.5

      - name: Add WiX UI extension
        run: wix extension add WixToolset.UI.wixext/4.0.5

      - name: Install Pandoc and Tectonic
        run: |
          choco install pandoc tectonic --no-progress -y
          $machinePath = [System.Environment]::GetEnvironmentVariable("PATH","Machine")
          $userPath    = [System.Environment]::GetEnvironmentVariable("PATH","User")
          echo "PATH=$machinePath;$userPath" >> $env:GITHUB_ENV

      - name: Build documentation
        run: |
          $version = git describe --tags --always
          pandoc docs/manual.md -o docs/manual.pdf --pdf-engine=tectonic --metadata "date=Version $version"

      - name: Restore NuGet packages
        run: nuget restore InventorDxfExportAddin/InventorDxfExportAddin.csproj

      - name: Build addin (Release)
        run: msbuild InventorDxfExportAddin/InventorDxfExportAddin.csproj /p:Configuration=Release

      - name: Build MSI
        run: dotnet build InventorDxfExportAddin.Setup/InventorDxfExportAddin.Setup.wixproj -c Release

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventorDxfExportAddin-MSI
          path: InventorDxfExportAddin.Setup/bin/Release/**/*.msi
          if-no-files-found: error

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: InventorDxfExportAddin-Manual
          path: docs/manual.pdf
          if-no-files-found: warn

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $msi = Get-ChildItem -Recurse -Filter *.msi "InventorDxfExportAddin.Setup/bin/Release" | Select-Object -First 1
          $pdf = "docs/manual.pdf"
          $assets = @($msi.FullName)
          if (Test-Path $pdf) { $assets += $pdf }
          gh release create "${{ github.ref_name }}" @assets `
            --title "Release ${{ github.ref_name }}" `
            --generate-notes
